services:
  - type: web
    name: linux-terminal
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: TERM
        value: xterm-256color
      - key: SSH_PASSWORD
        value: changeme123             # ← CHANGE THIS
      - key: RCLONE_CONFIG_BASE64
        value: ""                      # ← Paste your base64 rclone config here (see README)
